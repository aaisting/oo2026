<!doctype html>
<html>
  <head>
    <title>Takisti</title>
    <script src="takisti5.js"></script>
    <script>
        let r1, r2;
        function startPage(){
           r1=new Resistor(110, canvas1.getContext("2d"), 50, 150, 50);  
           range1.value=r1.getR();         
           range2.value=r1.getU(); 

           r2=new Resistor(110, canvas1.getContext("2d"), 250, 400, 50);  
           rangeu1.value=r2.getR();         
           rangeu2.value=r2.getU(); 
        }
    </script>
    <meta charset="utf-8">
  </head>
  <body onload="startPage()">
    <canvas id="canvas1" width="1000" height="600"></canvas><br />
    <label>takistus_1(OOMIDES):</label>
    <input type="range" id="range1" min="0" max="100"
           oninput="r1.setR(this.valueAsNumber)" />
    <label>takistus_2(OOMIDES):</label>
    <input type="range" id="range2" min="0" max="100"
           oninput="r2.setR(this.valueAsNumber)" />
    <label>volte_1:</label>
    <input type="range" id="rangeu1" min="0" max="100"
           oninput="r1.setU(this.valueAsNumber)" />
    <label>volte_2:</label>
    <input type="range" id="rangeu2" min="0" max="100"
           oninput="r2.setU(this.valueAsNumber)" />
  </body>
</html>
