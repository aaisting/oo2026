<!doctype html>
<html>
  <head>
    <title>Takisti</title>
    <script src="takisti3.js"></script>
    <script>
        let r1, r2, r3, r4, sc1;
        function startPage(){
            r1=new Resistor("R1", 110);  
            r2=new Resistor("R2", 220);
            r3=new Resistor("R3", 500);
            r4=new Resistor("R4", 220);
            sc1=new SeriesConnection("SC1");
            sc1.addResistor(r1);
            sc1.addResistor(r2); 
            sc2=new SeriesConnection("SC2");
            sc2.addResistor(sc1);
            sc2.addResistor(r3);
            sc2.addResistor(r4); 
            sc2.draw(canvas1.getContext("2d"), 10, 50);
            sc1.push(r1);
            sc1.push(r2);
            sc1.push(r3);
            range1.value=r1.getR();
            range2.value=r2.getR();
            range3.value=r3.getR();
        }
    </script>
    <meta charset="utf-8">
  </head>
  <body onload="startPage()">
      <canvas id="canvas1" width="500" height="100"></canvas><br />
      <input type="range" id="range1" min="100" max="1000" onchange="r1.setR(this.valueAsNumber)" />
      <input type="range" id="range2" min="100" max="1000" onChange="r2.setR(this.valueAsNumber)" />
      <input type="range" id="range3" min="100" max="1000" onChange="r3.setR(this.valueAsNumber)" />
  </body>
</html>
